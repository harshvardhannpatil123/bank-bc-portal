<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Settings</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
background:#0056b3;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#004494;
}
</style>

</head>
<body>

<div class="container">

<h2>Website Settings</h2>

<label>Website Name</label>
<input id="siteName" placeholder="Website Name">

<label>Subtitle</label>
<input id="siteSubtitle" placeholder="Subtitle">

<button onclick="saveSettings()">Save Settings</button>

</div>

<script>

document.getElementById("siteName").value=
localStorage.getItem("siteName")||"Shree Shrutasagar Drug House";

document.getElementById("siteSubtitle").value=
localStorage.getItem("siteSubtitle")||"Official Bank of Maharashtra BC Point";

function saveSettings(){

localStorage.setItem(
"siteName",
document.getElementById("siteName").value
);

localStorage.setItem(
"siteSubtitle",
document.getElementById("siteSubtitle").value
);

alert("Settings Saved Successfully");

}

</script>

</body>
</html>
